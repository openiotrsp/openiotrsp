openapi: 3.0.3
info:
  title: OpenIoTRSP Northbound API
  version: 0.1.0
  description: Stable HTTP API for queueing eSIM profile operations and reading device state.
  contact:
    name: OpenIoTRSP
servers:
  - url: /v1
tags:
  - name: Operations
    description: Queue and inspect asynchronous profile operations.
  - name: Devices
    description: Read device and profile state.
paths:
  /profile-downloads:
    post:
      tags:
        - Operations
      operationId: triggerProfileDownload
      summary: Trigger a profile download for one EID or a fleet EID list.
      description: Queues one profile download trigger per target EID and returns the operation ids immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileDownloadRequest"
      responses:
        "202":
          description: Operations queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /devices/{eid}/profiles/{iccid}/enable:
    post:
      tags:
        - Operations
      operationId: enableProfile
      summary: Queue a profile enable operation for an EID.
      description: Builds a signed PSMO enable package and queues it for the target device IPA.
      parameters:
        - $ref: "#/components/parameters/EID"
        - $ref: "#/components/parameters/ICCID"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /devices/{eid}/profiles/{iccid}/disable:
    post:
      tags:
        - Operations
      operationId: disableProfile
      summary: Queue a profile disable operation for an EID.
      description: Builds a signed PSMO disable package and queues it for the target device IPA.
      parameters:
        - $ref: "#/components/parameters/EID"
        - $ref: "#/components/parameters/ICCID"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /devices/{eid}/profiles/{iccid}:
    delete:
      tags:
        - Operations
      operationId: deleteProfile
      summary: Queue a profile delete operation for an EID.
      description: Builds a signed PSMO delete package and queues it for the target device IPA.
      parameters:
        - $ref: "#/components/parameters/EID"
        - $ref: "#/components/parameters/ICCID"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /eims/initial-configuration:
    post:
      tags:
        - Operations
      operationId: createInitialEimConfiguration
      summary: Emit initial eIM configuration data for vendor provisioning.
      description: Builds and stores provisioning-ready EimConfigurationData for ES10b AddInitialEim. The eIM does not orchestrate AddInitialEim itself.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EimConfigurationRequest"
      responses:
        "200":
          description: Initial eIM configuration data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EimConfiguration"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /devices/{eid}/eims:
    post:
      tags:
        - Operations
      operationId: addEim
      summary: Queue an addEim ECO operation for an EID.
      description: Builds a signed ECO addEim package and queues it for the target device IPA.
      parameters:
        - $ref: "#/components/parameters/EID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EimConfigurationRequest"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - Devices
      operationId: getAssociatedEims
      summary: Read locally observed Associated eIM state for an EID.
      parameters:
        - $ref: "#/components/parameters/EID"
      responses:
        "200":
          description: Associated eIM state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EimStatus"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /devices/{eid}/eims/initial-association:
    post:
      tags:
        - Operations
      operationId: recordInitialEimAssociation
      summary: Record a vendor-provisioned initial eIM association.
      description: Stores the Associated eIM state and association token returned by the IPA/eUICC AddInitialEim flow. This endpoint records the result; it does not send ES10b AddInitialEim.
      parameters:
        - $ref: "#/components/parameters/EID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EimConfigurationRequest"
      responses:
        "200":
          description: Initial association recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitialEimAssociation"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /devices/{eid}/eims/{eimId}:
    put:
      tags:
        - Operations
      operationId: updateEim
      summary: Queue an updateEim ECO operation for an EID.
      parameters:
        - $ref: "#/components/parameters/EID"
        - $ref: "#/components/parameters/EIMID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EimConfigurationRequest"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
    delete:
      tags:
        - Operations
      operationId: deleteEim
      summary: Queue a deleteEim ECO operation for an EID.
      parameters:
        - $ref: "#/components/parameters/EID"
        - $ref: "#/components/parameters/EIMID"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /devices/{eid}/eims/list:
    post:
      tags:
        - Operations
      operationId: listEim
      summary: Queue a listEim ECO operation for an EID.
      parameters:
        - $ref: "#/components/parameters/EID"
      responses:
        "202":
          description: Operation queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /devices/{eid}/status:
    get:
      tags:
        - Devices
      operationId: getDeviceStatus
      summary: Read profile state for one EID.
      description: Returns the eIM persisted view of all known profiles for the requested EID.
      parameters:
        - $ref: "#/components/parameters/EID"
      responses:
        "200":
          description: Device state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStatus"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /operations/{id}:
    get:
      tags:
        - Operations
      operationId: getOperationResult
      summary: Read operation status and completion result by id.
      description: Returns operation metadata and, once complete, the stored protocol result payload.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Operation status and optional result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResultResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    EID:
      name: eid
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-Fa-f]{32}$"
    ICCID:
      name: iccid
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-Fa-f]+$"
    EIMID:
      name: eimId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    ProfileDownloadRequest:
      type: object
      description: Provide either eid or eids, and exactly one download source.
      allOf:
        - oneOf:
            - required:
                - eid
            - required:
                - eids
        - oneOf:
            - required:
                - activationCode
            - required:
                - smdpAddress
                - matchingId
            - required:
                - defaultSmdp
              properties:
                defaultSmdp:
                  enum:
                    - true
            - required:
                - smdsAddress
      properties:
        eid:
          type: string
          pattern: "^[0-9A-Fa-f]{32}$"
        eids:
          type: array
          minItems: 1
          items:
            type: string
            pattern: "^[0-9A-Fa-f]{32}$"
        activationCode:
          type: string
          maxLength: 255
          example: 1$smdpp.test.rsp.sysmocom.de$TS48V1-B-UNIQUE
        smdpAddress:
          type: string
        matchingId:
          type: string
        defaultSmdp:
          type: boolean
          default: false
        smdsAddress:
          type: string
      additionalProperties: false
    EnqueueResponse:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
    Operation:
      type: object
      required:
        - id
        - eid
        - sequenceNumber
        - kind
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        eid:
          type: string
        sequenceNumber:
          type: integer
          format: int64
        kind:
          type: string
          enum:
            - euicc-package
            - profile-download-trigger
            - ipa-euicc-data
        status:
          type: string
          enum:
            - pending
            - in-flight
            - done
            - failed
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DeviceStatus:
      type: object
      required:
        - eid
        - profiles
      properties:
        eid:
          type: string
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/Profile"
    Profile:
      type: object
      required:
        - iccid
        - isEnabled
        - smdpAddress
      properties:
        iccid:
          type: string
        isEnabled:
          type: boolean
        smdpAddress:
          type: string
    EimConfigurationRequest:
      type: object
      properties:
        eimId:
          type: string
          minLength: 1
          maxLength: 128
          description: Defaults to the configured server eIM ID for addEim when omitted.
        eimFqdn:
          type: string
        eimIdType:
          type: integer
          format: int64
          enum:
            - 1
            - 2
            - 3
        counterValue:
          type: integer
          format: int64
          minimum: 0
          default: 1
        associationToken:
          type: integer
          format: int64
        eimPublicKeyDataBase64:
          type: string
          format: byte
          description: X.509 SubjectPublicKeyInfo DER. If omitted for this eIM, the configured signer public key is used.
        eimCertificateBase64:
          type: string
          format: byte
          description: X.509 certificate DER. Mutually exclusive with eimPublicKeyDataBase64.
        euiccCiPKIdBase64:
          type: string
          format: byte
      additionalProperties: false
    EimConfiguration:
      type: object
      required:
        - eimId
        - payloadBase64
        - config
      properties:
        eimId:
          type: string
        payloadBase64:
          type: string
          format: byte
          description: BER-TLV encoded EimConfigurationData.
        config:
          $ref: "#/components/schemas/AssociatedEim"
    InitialEimAssociation:
      type: object
      required:
        - eid
        - bootstrapAllowed
        - eim
      properties:
        eid:
          type: string
        bootstrapAllowed:
          type: boolean
          description: False after an Associated eIM has been recorded.
        eim:
          $ref: "#/components/schemas/AssociatedEim"
    EimStatus:
      type: object
      required:
        - eid
        - bootstrapAllowed
        - eims
      properties:
        eid:
          type: string
        bootstrapAllowed:
          type: boolean
          description: True when no Associated eIM is currently known for the eUICC, so AddInitialEim is coherent again.
        eims:
          type: array
          items:
            $ref: "#/components/schemas/AssociatedEim"
    AssociatedEim:
      type: object
      required:
        - eimId
      properties:
        eimId:
          type: string
        eimFqdn:
          type: string
        eimIdType:
          type: integer
          format: int64
        counterValue:
          type: integer
          format: int64
        associationToken:
          type: integer
          format: int64
    OperationResultResponse:
      type: object
      required:
        - operation
      properties:
        operation:
          $ref: "#/components/schemas/Operation"
        result:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/OperationResult"
    OperationResult:
      type: object
      required:
        - status
        - payloadBase64
        - createdAt
      properties:
        status:
          type: string
          enum:
            - done
            - failed
        payloadBase64:
          type: string
          format: byte
        createdAt:
          type: string
          format: date-time
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
