services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: openiotrsp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d openiotrsp"]
      interval: 2s
      timeout: 5s
      retries: 30

  eim-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        APP: eim-server
    restart: unless-stopped
    environment:
      OPENIOTRSP_DATABASE_URL: postgres://admin:secretpassword@postgres:5432/openiotrsp?sslmode=disable
      OPENIOTRSP_MIGRATIONS_DIR: /app/migrations
      OPENIOTRSP_EIM_LISTEN_ADDR: :8080
      OPENIOTRSP_DEMO_EID: ${OPENIOTRSP_DEMO_EID:-89049032123451234512345678901235}
      OPENIOTRSP_DEMO_SMDP_ADDRESS: ${OPENIOTRSP_DEMO_SMDP_ADDRESS:-smdpp.test.rsp.sysmocom.de}
      OPENIOTRSP_DEMO_MATCHING_ID: ${OPENIOTRSP_DEMO_MATCHING_ID:-TS48V1-B-UNIQUE}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 2s
      timeout: 5s
      retries: 30

  mockipa:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        APP: mockipa
    environment:
      OPENIOTRSP_EIM_ESIPA_URL: http://eim-server:8080/esipa
      OPENIOTRSP_DEMO_EID: ${OPENIOTRSP_DEMO_EID:-89049032123451234512345678901235}
      OPENIOTRSP_MOCKIPA_DOWNLOAD_MODE: ${OPENIOTRSP_MOCKIPA_DOWNLOAD_MODE:-live}
      OPENIOTRSP_SGP26_FIXTURE_ZIP: /app/spec/SGP.26_v3.0.2-17-July-2025.zip
      OPENIOTRSP_MOCKIPA_IMEI: ${OPENIOTRSP_MOCKIPA_IMEI:-490154203237518}
      OPENIOTRSP_MOCKIPA_ONCE: "false"
    depends_on:
      eim-server:
        condition: service_healthy

  offline-smdp:
    profiles: ["offline"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        APP: offline-smdp
    environment:
      OPENIOTRSP_OFFLINE_SMDP_LISTEN_ADDR: :8081
    ports:
      - "8081:8081"

volumes:
  postgres_data:
